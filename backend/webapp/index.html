<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>LearnScroll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#f7f3ec; --mut:#c9c1b3; --line:rgba(255,255,255,.16); --acc:#e0a367;
    --sci:#3b6ea5; --nature:#4a7c59; --histoire:#9a6a3c; --psychologie:#7d5ba6;
    --geopolitique:#a8503f; --economie:#3f7d78; --espace:#2d3561; --tech:#4a5568;
    --default:#5a4a3a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#0c0b0a;color:var(--ink);
    font-family:Inter,system-ui,sans-serif; overscroll-behavior:none;}
  #topbar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;
    justify-content:space-between;padding:14px 18px calc(14px);
    background:linear-gradient(#0c0b0acc,transparent);pointer-events:none;}
  #topbar .brand{font-family:Fraunces;font-weight:800;font-size:20px;letter-spacing:.01em;}
  #topbar .brand em{color:var(--acc);font-style:italic;}
  #gami{display:flex;gap:14px;align-items:center;font-size:13px;color:var(--mut);}
  #gami b{color:var(--ink);}
  .streak{color:var(--acc);font-weight:600;}

  #feed{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;}
  #feed::-webkit-scrollbar{display:none;}
  .card{height:100dvh;scroll-snap-align:start;position:relative;display:flex;flex-direction:column;
    justify-content:flex-end;padding:0 22px 40px;overflow:hidden;}
  .art{position:absolute;inset:0;z-index:0;}
  .art::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,.35)0%,rgba(0,0,0,.15)38%,rgba(0,0,0,.72)78%,#0c0b0a 100%);}
  .art .glyph{position:absolute;top:24%;left:50%;transform:translateX(-50%);
    font-size:120px;opacity:.16;filter:grayscale(.2);}
  .content{position:relative;z-index:2;max-width:640px;}
  .chips{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .chip{font-size:12px;padding:4px 11px;border:1px solid var(--line);border-radius:999px;
    background:rgba(0,0,0,.25);backdrop-filter:blur(6px);color:var(--ink);text-transform:capitalize;}
  .chip.time{color:var(--acc);border-color:rgba(224,163,103,.5);}
  .hook{font-family:Fraunces;font-weight:800;font-size:clamp(27px,6.4vw,40px);line-height:1.08;
    margin:0 0 12px;text-wrap:balance;text-shadow:0 2px 18px rgba(0,0,0,.5);}
  .teaser{font-size:16px;line-height:1.5;color:var(--mut);margin:0 0 22px;max-width:560px;}
  .rail{display:flex;align-items:center;gap:10px;}
  .rail .discover{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:14px;border-radius:14px;background:var(--acc);color:#221507;font-weight:600;
    border:none;font-size:15px;cursor:pointer;font-family:Inter;}
  .rail .act{width:52px;height:52px;border-radius:14px;border:1px solid var(--line);
    background:rgba(0,0,0,.3);backdrop-filter:blur(6px);color:var(--ink);font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:transform .12s;}
  .rail .act:active{transform:scale(.9);}
  .rail .act.on{background:var(--acc);border-color:var(--acc);color:#221507;}
  .hint-swipe{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:2;
    font-size:12px;color:var(--mut);opacity:.6;animation:bob 1.8s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,5px)}}

  /* ---- Détail ---- */
  #detail{position:fixed;inset:0;z-index:50;background:#0c0b0a;transform:translateY(100%);
    transition:transform .32s cubic-bezier(.2,.8,.2,1);overflow-y:auto;}
  #detail.open{transform:translateY(0);}
  #detail .dwrap{max-width:680px;margin:0 auto;padding:22px 22px 80px;}
  #detail .back{position:sticky;top:0;background:linear-gradient(#0c0b0a,transparent);
    padding:8px 0 16px;margin:-4px 0 6px;}
  #detail .back button{background:none;border:1px solid var(--line);color:var(--ink);
    padding:8px 14px;border-radius:10px;cursor:pointer;font-size:14px;}
  #detail h1{font-family:Fraunces;font-weight:800;font-size:30px;line-height:1.1;margin:6px 0 8px;}
  #detail .meta{color:var(--mut);font-size:13px;margin-bottom:20px;}
  #detail .body{font-size:17px;line-height:1.66;color:#ece6db;}
  #detail .body p{margin:0 0 16px;}
  .whybtn{margin:26px 0 8px;width:100%;padding:15px;border-radius:14px;border:1px dashed var(--acc);
    background:rgba(224,163,103,.08);color:var(--acc);font-weight:600;font-size:15px;cursor:pointer;}
  .layer{border-left:2px solid var(--acc);padding:2px 0 2px 16px;margin:16px 0;}
  .layer .q{font-family:Fraunces;font-weight:600;font-size:18px;margin-bottom:6px;}
  .layer .a{color:#ded7ca;line-height:1.55;}
  .deepen{display:flex;gap:8px;margin:10px 0 4px;}
  .deepen input{flex:1;background:#17150f;border:1px solid var(--line);color:var(--ink);
    padding:11px 13px;border-radius:10px;font-size:14px;}
  .deepen button{background:var(--acc);color:#221507;border:none;padding:0 16px;border-radius:10px;
    font-weight:600;cursor:pointer;}
  .sources{margin-top:30px;border-top:1px solid var(--line);padding-top:16px;}
  .sources h3{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);}
  .sources a{color:var(--acc);text-decoration:none;display:block;margin:6px 0;font-size:14px;}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#1c1913;border:1px solid var(--line);padding:11px 18px;border-radius:12px;z-index:80;
    opacity:0;transition:.25s;font-size:14px;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .empty{height:100dvh;display:flex;align-items:center;justify-content:center;text-align:center;
    padding:30px;color:var(--mut);}
</style>
</head>
<body>
<div id="topbar">
  <div class="brand">Learn<em>Scroll</em></div>
  <div id="gami"></div>
</div>
<div id="feed"></div>

<div id="detail"><div class="dwrap">
  <div class="back"><button onclick="closeDetail()">‹ Retour au feed</button></div>
  <div id="detailBody"></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
const USER = (localStorage.getItem('ls_user')) || (localStorage.setItem('ls_user','u'+Math.random().toString(36).slice(2,8)), localStorage.getItem('ls_user'));
const GLYPH = {science:'🌅',nature:'🐜',histoire:'🏛️',psychologie:'💭',geopolitique:'🌍',economie:'📈',espace:'🪐',tech:'⚙️',sante:'🧬',culture:'🎭'};
const feedEl = document.getElementById('feed');
let dwellStart = {}, currentId = null, favorites = new Set();

function tone(cat){ return getComputedStyle(document.documentElement).getPropertyValue('--'+cat).trim() || 'var(--default)'; }
function api(u,opts){ return fetch(u,opts).then(r=>r.json()); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1400); }
function log(card_id,kind,dwell_ms=0){ fetch('/api/interactions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:USER,card_id,kind,dwell_ms})}); }

async function gami(){
  const p = await api(`/api/profile?user_id=${USER}`);
  document.getElementById('gami').innerHTML =
    `<span class="streak">🔥 ${p.streak}</span><span><b>${p.level.name}</b></span><span>${p.stats.cards_viewed} lues</span>`;
}

async function loadFeed(){
  const {cards} = await api(`/api/feed?user_id=${USER}&limit=12`);
  if(!cards.length){ feedEl.innerHTML = `<div class="empty">Feed vide.<br>Lance <code>python seed_samples.py</code> ou un batch.</div>`; return; }
  feedEl.innerHTML = cards.map(cardHTML).join('');
  observe();
  gami();
}

function cardHTML(c){
  const g = GLYPH[c.category]||'✨';
  return `<section class="card" data-id="${c.id}" style="background:${tone(c.category)}">
    <div class="art" style="background:radial-gradient(120% 90% at 50% 12%, ${tone(c.category)} 0%, #0c0b0a 100%)"><div class="glyph">${g}</div></div>
    <div class="content">
      <div class="chips"><span class="chip">${c.category}</span><span class="chip time">⏱ ${c.reading_time}</span>${c.mode==='actualite'?'<span class="chip">actu</span>':''}</div>
      <h2 class="hook">${c.hook}</h2>
      <p class="teaser">${c.teaser}</p>
      <div class="rail">
        <button class="discover" onclick="openDetail(${c.id})">👇 Découvrir</button>
        <button class="act fav" data-id="${c.id}" onclick="toggleFav(${c.id},event)">❤️</button>
        <button class="act" onclick="share(${c.id},event)">📤</button>
      </div>
    </div>
    <div class="hint-swipe">glisse vers le haut ↑</div>
  </section>`;
}

/* Vue + temps passé via IntersectionObserver */
let io;
function observe(){
  if(io) io.disconnect();
  io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      const id = +e.target.dataset.id;
      if(e.isIntersecting){ dwellStart[id]=Date.now(); }
      else if(dwellStart[id]){
        const ms = Date.now()-dwellStart[id]; delete dwellStart[id];
        if(ms>1200) log(id,'view',ms);
      }
    });
  },{threshold:.6});
  document.querySelectorAll('.card').forEach(c=>io.observe(c));
}

function toggleFav(id,ev){ ev.stopPropagation();
  const on = favorites.has(id);
  if(on){favorites.delete(id);} else {favorites.add(id); log(id,'favorite'); }
  ev.currentTarget.classList.toggle('on',!on);
  toast(on?'Retiré des favoris':'Ajouté aux favoris ❤️');
}
function share(id,ev){ ev.stopPropagation(); log(id,'share'); toast('Lien copié 📤'); }

async function openDetail(id){
  currentId = id; log(id,'expand');
  const d = await api(`/api/cards/${id}`);
  const paras = d.body.split('\n').filter(Boolean).map(p=>`<p>${p}</p>`).join('');
  const layers = d.why_layers.map(l=>`<div class="layer"><div class="q">${l.question}</div><div class="a">${l.answer}</div></div>`).join('');
  const sources = d.sources.map(s=>`<a href="${s.url}" target="_blank" rel="noopener">↗ ${s.title}</a>`).join('');
  document.getElementById('detailBody').innerHTML = `
    <div class="chips"><span class="chip">${d.category}</span><span class="chip time">⏱ ${d.reading_time}</span>${d.series?`<span class="chip">${d.series} ${d.series_index?('· '+d.series_index):''}</span>`:''}</div>
    <h1>${d.hook}</h1>
    <div class="body">${paras}</div>
    <button class="whybtn" onclick="revealWhy()">💡 J'ai compris… mais pourquoi ?</button>
    <div id="whyTree" style="display:none">
      ${layers}
      <div class="deepen">
        <input id="whyInput" placeholder="Creuser encore : pose ta question…" />
        <button onclick="deepen()">Creuser</button>
      </div>
    </div>
    <div class="sources"><h3>Sources</h3>${sources}</div>`;
  document.getElementById('detail').classList.add('open');
}
function revealWhy(){ document.getElementById('whyTree').style.display='block'; document.querySelector('.whybtn').style.display='none'; }
async function deepen(){
  const inp=document.getElementById('whyInput'); const q=inp.value.trim(); if(!q)return;
  inp.disabled=true;
  const res = await api(`/api/cards/${currentId}/why`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
  const div=document.createElement('div'); div.className='layer';
  div.innerHTML=`<div class="q">${res.question}</div><div class="a">${res.answer}</div>`;
  inp.closest('.deepen').before(div); inp.value=''; inp.disabled=false; inp.focus();
}
function closeDetail(){ document.getElementById('detail').classList.remove('open'); gami(); }

loadFeed();
</script>
</body>
</html>
