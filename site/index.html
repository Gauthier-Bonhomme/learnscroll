<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0c0b0a" />
<meta name="description" content="LearnScroll — remplace le doomscrolling par du learnscrolling : chaque swipe t'apprend quelque chose en moins de 60 secondes." />
<title>LearnScroll</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header id="topbar">
  <div class="brand">Learn<em>Scroll</em></div>
  <div class="topActions">
    <button id="btnProfile" class="tchip" aria-label="Profil et progression">🔥 <b id="tStreak">0</b> · <span id="tLevel">Curieux</span></button>
    <button id="btnFavs" class="tchip" aria-label="Favoris">❤️ <b id="tFavs">0</b></button>
  </div>
</header>

<main id="feed" aria-label="Feed de cartes"></main>

<!-- Mode détail -->
<section id="detail" aria-label="Détail de la carte">
  <div class="dwrap">
    <div class="back"><button id="btnBack">‹ Retour au feed</button></div>
    <div id="detailBody"></div>
  </div>
</section>

<!-- Panneau favoris / profil -->
<section id="sheet" aria-label="Panneau">
  <div class="swrap">
    <div class="shead">
      <h2 id="sheetTitle"></h2>
      <button id="btnCloseSheet" aria-label="Fermer">✕</button>
    </div>
    <div id="sheetBody"></div>
  </div>
</section>

<div class="toast" id="toast" role="status"></div>

<noscript><div class="empty">LearnScroll a besoin de JavaScript pour fonctionner.</div></noscript>
<script src="app.js"></script>
</body>
</html>
